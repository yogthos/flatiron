<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" style="display: block; width: 100%; max-width: 800px; height: auto; border-radius: 32px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);">
    <style>
        text { font-family: system-ui, -apple-system, sans-serif; }
    </style>
    <defs>
            <!-- Background Grid Pattern -->
            <pattern id="bgGrid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1.5" opacity="0.7"/>
            </pattern>

            <!-- Neon Glow Filter -->
            <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur2" />
                <feMerge>
                    <feMergeNode in="blur2" />
                    <feMergeNode in="blur1" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <!-- Node Glow Filter -->
            <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <!-- Background Ambient Glow -->
        <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.12" />
            <stop offset="100%" stop-color="#0B1120" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Base Background -->
    <rect width="100%" height="100%" fill="#0B1120" />
    <rect width="100%" height="100%" fill="url(#bgGrid)" />
    
    <!-- Centering Wrapper for Square Canvas -->
    <g transform="translate(0, 100)">
        <circle cx="400" cy="280" r="350" fill="url(#ambientGlow)" />

        <!-- INPUT SECTION (Left) Flat, structured, tabular data packets -->
        <g fill="#0B1120" stroke-width="3" filter="url(#nodeGlow)">
            <!-- Cyan Track -->
            <line x1="100" y1="250" x2="331" y2="250" stroke="#06B6D4" opacity="0.3" stroke-width="2" />
            <rect x="120" y="244" width="30" height="12" stroke="#06B6D4" rx="2" />
            <rect x="180" y="244" width="45" height="12" stroke="#06B6D4" rx="2" />
            <rect x="250" y="244" width="20" height="12" stroke="#06B6D4" rx="2" />
            
            <!-- Amber Track -->
            <line x1="100" y1="280" x2="331" y2="280" stroke="#F59E0B" opacity="0.3" stroke-width="2" />
            <rect x="100" y="274" width="40" height="12" stroke="#F59E0B" rx="2" />
            <rect x="160" y="274" width="25" height="12" stroke="#F59E0B" rx="2" />
            <rect x="220" y="274" width="50" height="12" stroke="#F59E0B" rx="2" />
            
            <!-- Emerald Track -->
            <line x1="100" y1="310" x2="331" y2="310" stroke="#10B981" opacity="0.3" stroke-width="2" />
            <rect x="130" y="304" width="20" height="12" stroke="#10B981" rx="2" />
            <rect x="170" y="304" width="55" height="12" stroke="#10B981" rx="2" />
            <rect x="245" y="304" width="35" height="12" stroke="#10B981" rx="2" />
        </g>

        <!-- OUTPUT SECTION (Right) Interconnected Graph Database Edges -->
        <g stroke="#6366F1" stroke-width="3" stroke-linecap="round" opacity="0.5" filter="url(#nodeGlow)">
            <!-- Core to Tier 1 -->
            <line x1="469" y1="240" x2="540" y2="180" />
            <line x1="469" y1="240" x2="580" y2="260" />
            <line x1="469" y1="320" x2="580" y2="260" />
            <line x1="469" y1="320" x2="560" y2="380" />
            
            <!-- Tier 1 to Tier 2 -->
            <line x1="540" y1="180" x2="640" y2="160" />
            <line x1="540" y1="180" x2="580" y2="260" />
            <line x1="540" y1="180" x2="620" y2="210" />
            <line x1="580" y1="260" x2="620" y2="210" />
            <line x1="580" y1="260" x2="640" y2="160" />
            <line x1="580" y1="260" x2="660" y2="290" />
            <line x1="580" y1="260" x2="560" y2="380" />
            <line x1="560" y1="380" x2="660" y2="290" />
            <line x1="560" y1="380" x2="630" y2="420" />
            
            <!-- Tier 2 to Tier 3 -->
            <line x1="640" y1="160" x2="620" y2="210" />
            <line x1="640" y1="160" x2="660" y2="290" />
            <line x1="660" y1="290" x2="700" y2="360" />
            <line x1="660" y1="290" x2="630" y2="420" />
            <line x1="630" y1="420" x2="700" y2="360" />
        </g>

        <!-- OUTPUT SECTION (Right) Graph Database Nodes -->
        <g fill="#0B1120" stroke-width="4" filter="url(#nodeGlow)">
            <circle cx="540" cy="180" r="12" stroke="#06B6D4" />
            <circle cx="580" cy="260" r="16" stroke="#10B981" />
            <circle cx="560" cy="380" r="14" stroke="#F59E0B" />
            <circle cx="640" cy="160" r="10" stroke="#8B5CF6" />
            <circle cx="620" cy="210" r="8" stroke="#F59E0B" />
            <circle cx="660" cy="290" r="18" stroke="#06B6D4" />
            <circle cx="630" cy="420" r="12" stroke="#10B981" />
            <circle cx="700" cy="360" r="14" stroke="#8B5CF6" />
        </g>

        <!-- CENTER ENGINE Isometric Transformation Core -->
        <g stroke-linejoin="round">
            <!-- Outer Shell (Ghostly/Structural) -->
            <g stroke-width="2" fill="none" opacity="0.4">
                <polygon points="400,280 331,240 400,200 469,240" stroke="#06B6D4" /> <!-- Top Face -->
                <polygon points="400,280 331,240 331,320 400,360" stroke="#F59E0B" /> <!-- Left Face -->
                <polygon points="400,280 469,240 469,320 400,360" stroke="#10B981" /> <!-- Right Face -->
            </g>
            
            <!-- Inner Energy Core (Bright & Glowing) -->
            <g stroke-width="4" filter="url(#neonGlow)">
                <polygon points="400,280 365,260 400,240 435,260" stroke="#06B6D4" fill="#06B6D4" fill-opacity="0.15" />
                <polygon points="400,280 365,260 365,300 400,320" stroke="#F59E0B" fill="#F59E0B" fill-opacity="0.15" />
                <polygon points="400,280 435,260 435,300 400,320" stroke="#10B981" fill="#10B981" fill-opacity="0.15" />
            </g>

            <!-- Central Processing Orb -->
        <circle cx="400" cy="280" r="8" fill="#F8FAFC" filter="url(#neonGlow)" />
    </g>
    </g>

    <!-- Typography -->
    <g text-anchor="middle" transform="translate(0, 100)">
        <text x="400" y="490" font-weight="900" font-size="56" fill="#F8FAFC" letter-spacing="16">
            FLATIRON
        </text>
        <text x="400" y="530" font-weight="600" font-size="16" fill="#94A3B8" letter-spacing="8">
            GRAPH TRANSFORMATION ENGINE
        </text>
    </g>
</svg>
